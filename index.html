<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Escolar - EEB Francisco Manfroi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-attachment: fixed; background-size: cover;
            color: white; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden;
        }
        html { height: 100%; width: 100%; }

        /* --- ANIMAÇÕES --- */
        @keyframes flutuar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px rgba(0,255,204,0.3); }
            50% { transform: translateY(-20px); text-shadow: 0 0 40px rgba(0,255,204,0.8); }
            100% { transform: translateY(0px); text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        }
        @keyframes entradaLogo {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes piscar { 0% { background: rgba(180, 0, 0, 0.95); } 100% { background: rgba(230, 0, 0, 1); } }
        @keyframes piscarNome { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        /* Ajuste: Rolagem mais lenta (45s em vez de 30s) */
        @keyframes rolagemVertical { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* --- TELA DE BOAS-VINDAS --- */
        .tela-boas-vindas {
            display: none; flex-direction: column; justify-content: flex-start; align-items: center;
            text-align: center; background: radial-gradient(circle, #203a43 0%, #0f2027 100%);
            padding-top: 100px !important;
        }
        .boas-vindas-texto {
            font-family: 'Montserrat', sans-serif; font-size: 90px; font-weight: 900;
            letter-spacing: -2px; margin-bottom: 20px; animation: flutuar 4s ease-in-out infinite;
            color: #00ffcc; text-transform: uppercase;
        }
        .boas-vindas-logo {
            height: 550px; width: auto; animation: entradaLogo 2s ease-out;
            filter: drop-shadow(0 0 30px rgba(0,255,204,0.4));
        }

        /* --- ELEMENTOS FIXOS --- */
        #topoEsquerdo {
            position: absolute; top: 30px; left: 60px;
            display: flex; align-items: center; gap: 20px; z-index: 10;
            transition: opacity 0.5s;
        }
        #logoEscola { height: 220px; }
        #nomeEscola { font-size: 60px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        #dataHora {
            position: absolute; top: 30px; right: 60px;
            font-size: 22px; font-weight: bold; text-align: right; line-height: 1.4; z-index: 10;
            transition: opacity 0.5s;
        }

        #climaBox {
            position: absolute; top: 100px; right: 60px;
            background: rgba(0, 0, 0, 0.75); padding: 25px 40px; border-radius: 20px;
            backdrop-filter: blur(12px); box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
            z-index: 10; transition: opacity 0.5s;
        }
        #clima { font-size: 48px; font-weight: bold; display: flex; align-items: center; gap: 15px; }

        .tela {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 280px 80px 60px 80px; box-sizing: border-box; opacity: 0;
            transition: opacity 1s ease-in-out; pointer-events: none; display: none;
        }
        .tela.ativa { opacity: 1; pointer-events: auto; display: block; }
        .tela-boas-vindas.ativa { display: flex; }
        .tela-aniversario.ativa { display: flex; }

        /* --- AGENDAMENTOS --- */
        #lista { height: 70vh; overflow: hidden; position: relative; }
        .container-scroll { animation: rolagemVertical 45s linear infinite; }
        .evento { background: rgba(255,255,255,0.1); padding: 20px; margin-bottom: 15px; border-radius: 10px; }
        .titulo { font-size: 28px; font-weight: bold; }
        .horario { font-size: 22px; color: #00ffcc; }
        .descricao-evento { font-size: 18px; color: #ccc; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; line-height: 1.3; }

        /* --- PREVISÃO DO TEMPO --- */
        .container-previsao { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .header-previsao { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.5); padding: 20px; border-radius: 20px; 
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        .temp-principal { font-size: 90px; font-weight: bold; display: flex; align-items: center; gap: 15px; }
        .descricao-temp { font-size: 30px; font-weight: normal; color: #ddd; text-transform: capitalize; }
        
        .detalhes-clima { display: flex; gap: 40px; text-align: center; }
        .detalhe-valor { font-weight: bold; color: white; font-size: 28px; }

        .grafico-temp { 
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; 
            height: 150px; display: flex; justify-content: space-around; 
            align-items: flex-end; backdrop-filter: blur(10px); margin-top: 5px;
        }
        .barra-hora { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
        .barra { width: 40px; background: #00ffcc; border-radius: 10px 10px 0 0; transition: height 0.5s; }
        .barra-temp { font-size: 18px; font-weight: bold; }
        .barra-label { font-size: 16px; color: #ddd; }

        /* --- AVISOS E DICAS --- */
        #telaAvisos { padding-top: 380px; } 
        .aviso { background: #ffcc00; color: black; padding: 30px; border-radius: 12px; font-size: 60px; font-weight: bold; }
        #conteudoDicas { display: flex; justify-content: center; align-items: center; height: 100%; }
        .dica-item {
            background: rgba(0, 128, 255, 0.15); padding: 60px; border-radius: 25px; 
            font-size: 48px; line-height: 1.4; width: 90%; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); display: none; animation: entradaLogo 0.8s ease-in-out;
        }
        .dica-item.ativa { display: block; }
        .dica-item strong { font-size: 60px; color: #00ffcc; display: block; margin-bottom: 25px; text-transform: uppercase; }

        /* --- MIDIA E ANIVERSARIOS --- */
        #slideshow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        .slide { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .slide.ativo { opacity: 1; }

        .tela-aniversario { 
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%); 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start !important; 
            align-items: center; 
            position: relative; 
            padding-top: 80px !important; 
        }
        .nome-aniversariante { font-size: 55px; font-weight: bold; color: #fff; animation: piscarNome 1s infinite; }
        .foto-aniversariante { width: 250px; height: 250px; border-radius: 50%; border: 10px solid white; position: relative; z-index: 2; margin-top: 10px; }
        #confettiCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        .oculto { opacity: 0 !important; pointer-events: none; }

        /* --- TELA VERMELHA (PAUSA) --- */
        #relOpcional { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(200, 0, 0, 0.95); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 99999; 
            animation: piscar 1s infinite alternate ease-in-out; 
        }
        #relOpcionalTexto { font-size: 100px; font-weight: bold; color: white; margin-bottom: 20px; text-shadow: 4px 4px 10px black; }
        #relOpcionalConteudo { font-size: 180px; font-weight: bold; color: white; }
    </style>
</head>

<body>
    <div id="relOpcional" class="oculto">
        <div id="relOpcionalTexto">PAUSA FINALIZADA</div>
        <div id="relOpcionalConteudo"></div>
        <audio id="alarmeAudio" preload="auto" loop><source src="https://raw.githubusercontent.com/infofranciscomanfroi/drive/main/sirene.mp3" type="audio/mpeg"></audio>
    </div>

    <div id="topoEsquerdo">
        <img src="https://i.ibb.co/Wvvft9tN/C-pia-de-Logo-escola.png" id="logoEscola">
        <div id="nomeEscola">EEB FRANCISCO MANFROI</div>
    </div>
    <div id="dataHora"></div>
    <div id="climaBox"><div id="clima">Carregando...</div></div>

    <div id="telaBoasVindas" class="tela tela-boas-vindas ativa">
        <div class="boas-vindas-texto">Seja muito bem-vindo à</div>
        <img src="https://i.ibb.co/Wvvft9tN/C-pia-de-Logo-escola.png" class="boas-vindas-logo">
    </div>

    <div id="telaAgenda" class="tela">
        <h1>AGENDAMENTOS DE HOJE</h1>
        <div id="lista"><div class="container-scroll" id="containerScroll"></div></div>
    </div>

    <div id="telaAvisos" class="tela"><h1>AVISOS IMPORTANTES</h1><div id="avisos"></div></div>
    <div id="telaDicas" class="tela"><h1>DICAS EDUCACIONAIS</h1><div id="conteudoDicas"></div></div>
    <div id="telaPrevisao" class="tela"><h1>Previsão do tempo para amanhã em Lages - SC</h1><div class="container-previsao" id="previsaoBox"></div></div>
    <div id="telaMidia" class="tela"><div id="slideshow"></div></div>
    
    <div id="telaAniversario" class="tela tela-aniversario">
        <canvas id="confettiCanvas"></canvas>
        <div style="font-size: 110px; z-index: 2; margin-bottom: 10px;">🎂</div>
        <h1 style="font-size: 90px; z-index: 2; margin: 0;">FELIZ ANIVERSÁRIO!</h1>
        <div id="listaAniversariantes" style="display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; z-index: 2; margin-top: 20px;"></div>
    </div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbzH8YkO4YOV-xx76siueEcdWYmy5BKT9TJSqPQvdRLHZjKZ9tlLMfHWNNJa5pDfYRqG/exec";
const tempoDicaIndividual = 10000;
const tempoImagem = 5000;
const tempoSlideshowTotal = 20000;
const tempoTelasNormais = 10000;

let listaDicas = [];
let dicaAtualIdx = 0;
let intervaloDicasInterno, slideTimeout, intervaloTelas;
let listaAniversariantesAtual = [];
let qtdEventosHoje = 0; // Variável para controlar tempo da agenda
let telaAtual = 0;
let telas = ["telaBoasVindas", "telaAgenda", "telaAvisos", "telaDicas", "telaPrevisao", "telaMidia", "telaAniversario"];

const slidesContent = [
  { src: "https://i.postimg.cc/jdKsnrZL/Dia-da-Mulher-Mensagem-Floral-Dourado-Caneca-Panoramica.jpg" },
  { src: "https://i.postimg.cc/9FvYYJw7/06.jpg" }
];

function atualizarTudo() { carregarClima(); carregarPrevisaoAmanha(); carregarEventos(); carregarAvisos(); carregarDicas(); buscarAniversariantes(); }

function carregarEventos(){ 
    fetch(BASE_URL).then(r=>r.json()).then(data=>{ 
        let html=""; const hoje=new Date().toDateString(); 
        let contador = 0;
        for(let i=1;i<data.length;i++){ 
            if(new Date(data[i][1]).toDateString() === hoje) { 
                contador++;
                html+=`<div class="evento">
                    <div class="titulo">${data[i][0]}</div>
                    <div class="horario">${new Date(data[i][1]).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} - ${new Date(data[i][2]).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                    <div class="descricao-evento">${(data[i][3]||"").replace(/\n/g,'<br>')}</div>
                </div>`; 
            } 
        } 
        qtdEventosHoje = contador;
        // Duplicamos o HTML para criar o efeito de scroll infinito fluido
        document.getElementById("containerScroll").innerHTML=(html||"<div class='evento'>Nenhum evento agendado para hoje</div>") + (contador > 0 ? html : ""); 
    }); 
}

function carregarDicas(){ fetch(BASE_URL + "?tipo=dicas").then(r => r.json()).then(data => { listaDicas = data.slice(1); renderizarDica(); }); }
function renderizarDica() { const container = document.getElementById("conteudoDicas"); if (listaDicas.length === 0) { container.innerHTML = "<div class='dica-item ativa'>Nenhuma dica disponível</div>"; return; } let html = ""; listaDicas.forEach((d, idx) => { html += `<div class="dica-item" id="dica_${idx}"><strong>${d[0]||""}</strong>${d[1]||""}</div>`; }); container.innerHTML = html; }
function mostrarProximaDica() { document.querySelectorAll('.dica-item').forEach(el => el.classList.remove('ativa')); const elemento = document.getElementById(`dica_${dicaAtualIdx}`); if (elemento) elemento.classList.add('ativa'); dicaAtualIdx = (dicaAtualIdx + 1) % listaDicas.length; }

function carregarPrevisaoAmanha(){ 
    fetch(BASE_URL + "?tipo=previsaoAmanha").then(r=>r.json()).then(data=>{ 
        let html = `<div class="header-previsao"><div class="temp-principal"><img src="https://openweathermap.org/img/wn/${data.icone}@4x.png" style="height:120px"><div class="temp-e-desc"><div>${data.temperatura}°C</div><div class="descricao-temp">${data.descricao}</div></div></div><div class="detalhes-clima"><div>Máx/Mín<br><span class="detalhe-valor">${data.maxima}°/${data.minima}°</span></div><div>Umidade<br><span class="detalhe-valor">${data.umidade}%</span></div><div>Vento<br><span class="detalhe-valor">${data.vento} km/h</span></div></div></div><div class="grafico-temp" id="graficoContainer"></div>`;
        document.getElementById("previsaoBox").innerHTML = html;
        if(data.grafico){ const gc = document.getElementById("graficoContainer"); const temps = data.grafico.map(p => p.temp), minT = Math.min(...temps), maxT = Math.max(...temps), range = maxT - minT; data.grafico.forEach(p => { const alt = range === 0 ? 50 : ((p.temp - minT) / range) * 80 + 20; gc.innerHTML += `<div class="barra-hora"><span class="barra-temp">${p.temp}°</span><div class="barra" style="height:${alt}px"></div><span class="barra-label">${p.hora}h</span></div>`; }); }
    }); 
}

function trocarTela() {
    if(intervaloTelas) clearInterval(intervaloTelas);
    if(intervaloDicasInterno) clearInterval(intervaloDicasInterno);
    if (telaAtual === 0) { atualizarTudo(); }
    
    telas.forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove("ativa");
    });
    
    let idAtual = telas[telaAtual];
    if (idAtual === "telaAniversario" && listaAniversariantesAtual.length === 0) { telaAtual = (telaAtual + 1) % telas.length; trocarTela(); return; }
    
    document.getElementById(idAtual).classList.add("ativa");
    
    if (idAtual === "telaAniversario") { dispararConfetes(); }

    if (idAtual === "telaDicas") {
        dicaAtualIdx = 0; mostrarProximaDica();
        let tempoTotalDicas = Math.max(tempoTelasNormais, listaDicas.length * tempoDicaIndividual);
        intervaloDicasInterno = setInterval(mostrarProximaDica, tempoDicaIndividual);
        intervaloTelas = setInterval(trocarTela, tempoTotalDicas);
    } else if (idAtual === "telaAgenda") {
        // Lógica: Se houver mais de 3 eventos, aumenta o tempo para permitir a leitura de todos.
        // Calculamos 8 segundos por evento, com um mínimo de 15 segundos.
        let tempoAgenda = Math.max(15000, qtdEventosHoje * 8000);
        intervaloTelas = setInterval(trocarTela, tempoAgenda);
    } else if (idAtual === "telaMidia") {
        iniciarSlideshow(); intervaloTelas = setInterval(trocarTela, tempoSlideshowTotal);
    } else {
        intervaloTelas = setInterval(trocarTela, tempoTelasNormais);
    }
    
    const ocultarFixos = idAtual === "telaAniversario" || idAtual === "telaMidia" || idAtual === "telaBoasVindas";
    document.getElementById("topoEsquerdo").classList.toggle("oculto", ocultarFixos);
    document.getElementById("climaBox").classList.toggle("oculto", ocultarFixos);
    document.getElementById("dataHora").classList.toggle("oculto", ocultarFixos);
    telaAtual = (telaAtual + 1) % telas.length;
}

function atualizarDataHora(){ const agora = new Date(); const data = agora.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}); document.getElementById("dataHora").innerHTML = data.charAt(0).toUpperCase()+data.slice(1) + "<br>" + agora.toLocaleTimeString('pt-BR'); }
setInterval(atualizarDataHora,1000);

function carregarClima(){ fetch(BASE_URL + "?tipo=clima").then(r=>r.json()).then(data=>{ document.getElementById("clima").innerHTML = `${data.temperatura}°C <img src="https://openweathermap.org/img/wn/${data.icone}@2x.png" style="height:60px; vertical-align:middle;"> ${data.descricao}`; }); }
function carregarAvisos(){ fetch(BASE_URL + "?tipo=avisos").then(r=>r.json()).then(data=>{ let html="", hoje=new Date(); hoje.setHours(0,0,0,0); for(let i=1;i<data.length;i++){ let ini=new Date(data[i][2]), fim=new Date(data[i][3]); if(hoje>=ini && hoje<=fim) html+=`<div class="aviso"><strong>${data[i][0]}</strong><br>${data[i][1]}</div>`; } document.getElementById("avisos").innerHTML=html || "Sem avisos"; }); }
function buscarAniversariantes() { fetch(BASE_URL + "?tipo=aniversariantes").then(r => r.json()).then(lista => { listaAniversariantesAtual = lista; const container = document.getElementById("listaAniversariantes"); container.innerHTML = ""; if (lista.length > 0) { lista.forEach(p => { container.innerHTML += `<div style="text-align:center"><div class="nome-aniversariante">${p.nome}</div><img src="${p.foto}" class="foto-aniversariante" onerror="this.src='https://i.ibb.co/C0L501F/avatar-padrao.png'"></div>`; }); } }); }
function iniciarSlideshow(){ const container = document.getElementById("slideshow"); container.innerHTML = ""; slidesContent.forEach((item, idx) => { let div = document.createElement("div"); div.className = "slide" + (idx === 0 ? " ativo" : ""); div.style.backgroundImage = `url(${item.src})`; container.appendChild(div); }); let sIdx = 0; const slides = document.querySelectorAll(".slide"); if(slideTimeout) clearInterval(slideTimeout); slideTimeout = setInterval(() => { if(slides[sIdx]) slides[sIdx].classList.remove("ativo"); sIdx = (sIdx + 1) % slides.length; if(slides[sIdx]) slides[sIdx].classList.add("ativo"); }, tempoImagem); }

function dispararConfetes() {
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    const colors = ['#f44336','#e91e63','#9c27b0','#673ab7','#3f51b5','#2196f3','#03a9f4','#00bcd4','#009688','#4caf50','#8bc34a','#cddc39','#ffeb3b','#ffc107','#ff9800','#ff5722'];

    for (let i = 0; i < 150; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            size: Math.random() * 10 + 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            speed: Math.random() * 3 + 2,
            angle: Math.random() * 6.28
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size/2, 0, Math.PI * 2);
            ctx.fill();
            p.y += p.speed;
            p.x += Math.sin(p.angle) * 1;
            if (p.y > canvas.height) p.y = -10;
        });
        if (document.getElementById('telaAniversario').classList.contains('ativa')) {
            requestAnimationFrame(draw);
        }
    }
    draw();
}

setInterval(()=>{ 
    const agora=new Date(), h=agora.getHours(), m=agora.getMinutes(), s=agora.getSeconds(); 
    const horários = [
        {h: 9, m: 30}, {h: 10, m: 0}, {h: 15, m: 15}, 
        {h: 15, m: 30}, {h: 16, m: 0}, {h: 20, m: 0}
    ];
    const éHoraDePausa = horários.some(tempo => tempo.h === h && tempo.m === m);
    if(éHoraDePausa && s === 0){ 
        document.getElementById("relOpcional").classList.remove("oculto"); 
        const alarme = document.getElementById("alarmeAudio");
        alarme.volume = 1.0; 
        alarme.play().catch(e => {}); 
        setTimeout(() => { alarme.pause(); alarme.currentTime = 0; }, 30000);
        setTimeout(()=> { document.getElementById("relOpcional").classList.add("oculto"); }, 120000); 
    } 
    document.getElementById("relOpcionalConteudo").innerText = agora.toLocaleTimeString('pt-BR'); 
},1000);

document.addEventListener('click', () => {
    const alarme = document.getElementById("alarmeAudio");
    alarme.play().then(() => { alarme.pause(); alarme.currentTime = 0; }).catch(()=>{});
}, { once: true });

atualizarTudo(); trocarTela();
</script>
</body>
</html>
