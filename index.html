<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Escolar - EEB Francisco Manfroi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    /* === RESET E BASE === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }

    body {
      background: linear-gradient(180deg, #060d1f 0%, #0c1a40 25%, #1a0d45 55%, #2d0a5c 80%, #1a0438 100%);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
    }

    .tela {
      position: absolute; inset: 0; opacity: 0; pointer-events: none;
      transition: opacity 1s ease-in-out; display: flex; flex-direction: column;
    }
    .tela.ativa { opacity: 1; pointer-events: auto; }

    /* === BARRA SUPERIOR === */
    #topBar, #climaBadge { opacity: 0; transition: opacity 0.8s; z-index: 10; }
    .visivel { opacity: 1 !important; }
    
    #topBar {
      position: absolute; top: 0; left: 0; right: 0; display: flex;
      align-items: center; justify-content: space-between; padding: 40px 60px;
      background: linear-gradient(180deg, rgba(6,13,26,0.9) 0%, transparent 100%);
    }

    .relogio-container { display: flex; flex-direction: column; align-items: center; text-align: center; }
    #hora { font-size: 64px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
    #data { font-size: 28px; font-weight: 600; opacity: 0.8; text-transform: capitalize; margin-top: 10px; }

    #climaBadge {
      position: absolute; top: 260px; right: 60px;
      background: rgba(255,255,255,0.1); padding: 15px 30px; border-radius: 25px;
      display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(15px);
    }
    #climaIcone { width: 75px; filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.4)); }
    #climaInfo { display: flex; align-items: center; gap: 15px; }
    .divisor-clima { width: 2px; height: 40px; background: rgba(255,255,255,0.3); }
    #clima { font-weight: 900; font-size: 38px; }
    #climaDesc { font-size: 16px; text-transform: uppercase; opacity: 0.9; font-weight: 700; letter-spacing: 1px; }

    /* === CABEÇALHOS === */
    .section-header { margin: 320px 60px 40px; display: flex; align-items: center; gap: 20px; }
    .section-header.descido { margin-top: 400px; }
    .bar { width: 8px; height: 45px; background: #ffffff; border-radius: 4px; }
    h1 { font-size: 40px; text-transform: uppercase; font-weight: 900; color: #ffffff; letter-spacing: 2px; }

    /* === CONTEÚDOS COMUNS === */
    #containerScroll, #containerNoticias { padding: 0 60px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; transition: opacity 0.8s ease-in-out; }
    
    .event-card-bento, .news-card-bento { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; padding: 25px; min-height: 130px; backdrop-filter: blur(20px); display: flex; flex-direction: column; }
    .event-card-bento .badge-hora, .news-card-bento .badge-fonte { display: inline-block; background: #ffb347; color: #000; padding: 8px 18px; border-radius: 12px; font-weight: 900; font-size: 22px; margin-bottom: 15px; width: fit-content; }
    .news-card-bento .badge-fonte { background: #a2d2ff; }
    .event-card-bento h3, .news-card-bento h3 { font-size: 28px; font-weight: 900; color: #ffffff; text-transform: uppercase; line-height: 1.2; margin-bottom: 10px; }
    .event-card-bento .local, .news-card-bento .resumo { font-size: 20px; color: #ffb347; font-weight: 700; white-space: pre-line; opacity: 0.9; }
    
    .news-content-wrapper { display: flex; gap: 20px; }
    .news-image { width: 220px; height: 160px; border-radius: 20px; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); }
    .news-card-bento .resumo { color: #ffffff; font-weight: 400; font-size: 18px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

    .aviso-card { background: #ffcc00; border-radius: 25px; padding: 40px; margin: 0 60px 30px 60px; display: flex; align-items: center; gap: 40px; border: 5px solid #ffffff; animation: pulseAviso 2s infinite; color: #000; }
    .aviso-icon { font-size: 80px; }
    .aviso-card h3 { font-weight: 900; font-size: 42px; color: #000 !important; }
    .aviso-card p { font-weight: 700; font-size: 28px; color: #222222; }

    .glass-card { background: rgba(255,255,255,0.05); border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }

    /* === TELA BOAS VINDAS === */
    #telaBoasVindas { justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #1a0d45 0%, #060d1f 100%); overflow: hidden; }
    #telaBoasVindas::before { content: ''; position: absolute; inset: -50%; background: radial-gradient(circle at center, rgba(45, 10, 92, 0.4) 0%, transparent 60%); animation: aurora 20s linear infinite; filter: blur(60px); opacity: 0.6; z-index: 1; }
    .bv-content { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 40px; }
    .bv-saudacao { font-size: 7vh; font-weight: 900; text-transform: uppercase; color: #ffffff; text-shadow: 0 0 30px rgba(255,255,255,0.3); animation: bvFadeInDown 1.5s ease-out forwards; opacity: 0; }
    .bv-logo-wrapper { position: relative; animation: bvScaleIn 1.8s ease-out forwards; opacity: 0; }
    .bv-logo { height: 55vh; filter: drop-shadow(0 0 40px rgba(255,255,255,0.2)); animation: bvLogoPulse 8s ease-in-out infinite; }
    .bv-escola-nome { font-size: 4vh; font-weight: 900; text-transform: uppercase; color: #ffb347; text-shadow: 0 0 20px rgba(255,179,71,0.4); animation: bvFadeInUp 1.5s ease-out 0.5s forwards; opacity: 0; }

    /* === TELA PREVISÃO === */
    .clima-container { padding: 0 60px; flex: 1; display: flex; flex-direction: column; gap: 40px; justify-content: center; }
    .clima-hero { display: flex; align-items: center; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 50px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
    .temp-main { font-size: 160px; font-weight: 900; line-height: 1; letter-spacing: -5px; }
    .clima-desc-hero { font-size: 30px; text-transform: uppercase; font-weight: 700; opacity: 0.8; letter-spacing: 2px; }
    .clima-detalhes-grid { display: flex; gap: 60px; }
    .detalhe-item { text-align: center; }
    .detalhe-label { font-size: 14px; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; }
    .detalhe-valor { font-size: 28px; font-weight: 900; }
    .previsao-hourly { display: flex; gap: 20px; justify-content: space-between; }
    .hour-card { background: rgba(255,255,255,0.08); padding: 25px 15px; border-radius: 25px; flex: 1; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
    .hour-temp { font-size: 32px; font-weight: 900; display: block; margin: 10px 0; color: #ffb347; }

    /* === TELA ANIVERSÁRIO === */
    #telaAniversario { background: radial-gradient(circle at center, #1a0438 0%, #060d1f 100%); justify-content: flex-start; align-items: center; text-align: center; padding-top: 100px; }
    .aniv-title { font-family: 'Dancing Script', cursive; font-size: 110px; color: #ffb347; text-shadow: 0 0 30px rgba(255,179,71,0.6); margin-bottom: 20px; }
    .aniv-card { background: rgba(255, 255, 255, 0.07); border: 2px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); padding: 60px 40px; border-radius: 60px; text-align: center; width: 600px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); animation: cardFloat 3s ease-in-out infinite; }
    .aniv-photo-wrapper { position: relative; width: 320px; height: 320px; margin: 0 auto 40px; }
    .aniv-photo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 12px solid #ffb347; box-shadow: 0 0 40px rgba(255,179,71,0.5); }
    .aniv-name { font-size: 38px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 3px; line-height: 1.1; }
    
    /* === TELA PAUSA === */
    #telaPausa { background: #b30000; justify-content: center; align-items: center; text-align: center; z-index: 10000; }
    .pausa-ativa { animation: blinkRed 1s infinite alternate; }
    .pausa-texto { font-size: 120px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; color: white; text-shadow: 0 0 50px rgba(0,0,0,0.5); }
    .pausa-relogio { font-size: 180px; font-weight: 900; margin-top: 40px; font-family: monospace; }

    /* === ANIMAÇÕES === */
    @keyframes blinkRed { 0% { background: #b30000; } 100% { background: #ff0000; } }
    @keyframes aurora { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes bvLogoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    @keyframes bvFadeInDown { 0% { opacity: 0; transform: translateY(-50px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes bvFadeInUp { 0% { opacity: 0; transform: translateY(50px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes bvScaleIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes pulseAviso { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    @keyframes cardFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes confeteFall { 0% { transform: translateY(-15vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(115vh) rotate(360deg); opacity: 0.7; } }
    .confete { position: absolute; border-radius: 50%; animation: confeteFall 5s linear infinite; }
    #slideshow { width: 100%; height: 100%; background-size: cover; background-repeat: no-repeat; background-position: center; background-color: #000; transition: opacity 0.8s ease-in-out; }
  </style>
</head>
<body>

<audio id="audioInicio" src="https://raw.githubusercontent.com/infofranciscomanfroi/drive/main/sirene.mp3" preload="auto"></audio>
<audio id="audioFim" src="https://raw.githubusercontent.com/infofranciscomanfroi/drive/main/Audio-pausa-finalizada.mp3" preload="auto"></audio>

<div id="topBar">
  <div style="display:flex; align-items:center; gap:30px;"> <img src="https://raw.githubusercontent.com/infofranciscomanfroi/drive/refs/heads/main/Logo-escola-sem-fundo.png" height="220">
    <div>
      <div style="font-size:42px; font-weight:900;">EEB FRANCISCO MANFROI</div>
      <div style="font-size:18px; opacity:0.7; font-weight: 600;">PAINEL DIGITAL INFORMATIVO</div>
    </div>
  </div>
  <div class="relogio-container">
    <div id="hora">00:00:00</div>
    <div id="data">---</div>
  </div>
</div>

<div id="climaBadge">
  <img id="climaIcone" src="" width="60">
  <div id="climaInfo"><div id="clima">--°C</div><div class="divisor-clima"></div><div id="climaDesc">--</div></div>
</div>

<div id="telaPausa" class="tela">
  <div class="pausa-texto">PAUSA FINALIZADA!</div>
  <div id="pausaRelogio" class="pausa-relogio">00:00:00</div>
</div>

<div id="telaBoasVindas" class="tela ativa">
    <div class="bv-content">
        <div class="bv-saudacao">SEJA MUITO BEM-VINDO À</div>
        <div class="bv-logo-wrapper"><img src="https://raw.githubusercontent.com/infofranciscomanfroi/drive/refs/heads/main/Logo-escola-sem-fundo.png" class="bv-logo"></div>
        <div class="bv-escola-nome">EEB FRANCISCO MANFROI</div>
    </div>
</div>

<div id="telaAgenda" class="tela">
  <div class="section-header descido"><div class="bar"></div><h1>Agendamentos de Hoje</h1></div>
  <div id="containerScroll"></div>
</div>

<div id="telaAniversario" class="tela">
    <div id="confettiContainer" style="position: absolute; inset: 0; pointer-events: none; z-index: 1;"></div>
    <div class="aniv-title">Feliz Aniversário!</div>
    <div id="listaAniversariantes" style="display: flex; justify-content: center; gap: 60px; padding: 20px; position: relative; z-index: 10; margin-top: 50px;"></div>
</div>

<div id="telaAvisos" class="tela">
  <div class="section-header descido"><div class="bar"></div><h1>Avisos Importantes</h1></div>
  <div id="avisos" style="padding:0 50px;"></div>
</div>

<div id="telaDicas" class="tela">
  <div class="section-header"><div class="bar"></div><h1>Dicas Educacionais</h1></div>
  <div id="conteudoDicas" class="glass-card" style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 50px 50px 50px; padding: 60px; text-align: center;"></div>
</div>

<div id="telaPrevisao" class="tela">
  <div class="section-header"><div class="bar"></div><h1>Previsão para Amanhã</h1></div>
  <div id="previsaoBox" class="clima-container"></div>
</div>

<div id="telaMidia" class="tela"><div id="slideshow"></div></div>

<div id="telaNoticias" class="tela">
  <div class="section-header descido"><div class="bar"></div><h1 id="noticiaTitulo">Notícias de Santa Catarina</h1></div>
  <div id="containerNoticias"></div>
</div>

<div id="telaCuriosidades" class="tela">
  <div class="section-header descido"><div class="bar"></div><h1>Você Sabia?</h1></div>
  <div class="glass-card" style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 60px 60px 60px; padding: 60px; text-align: center;">
    <div id="textoCuriosidade" style="font-size: 5vh; font-weight: 700; line-height: 1.4; color: #ffb347;"></div>
  </div>
</div>

<script>
// === CONFIGURAÇÕES E VARIAVEIS ===
const BASE_URL = "https://script.google.com/macros/s/AKfycbzH8YkO4YOV-xx76siueEcdWYmy5BKT9TJSqPQvdRLHZjKZ9tlLMfHWNNJa5pDfYRqG/exec";
const G1_RSS = "https://api.rss2json.com/v1/api.json?rss_url=https://g1.globo.com/dynamo/sc/santa-catarina/rss2.xml&include_content=true";
const ND_RSS = "https://api.rss2json.com/v1/api.json?rss_url=https://ndmais.com.br/feed/&include_content=true";
const NA_RSS = "https://api.rss2json.com/v1/api.json?rss_url=https://noticianoato.com.br/feed/&include_content=true";
const SLIDES = ["https://raw.githubusercontent.com/infofranciscomanfroi/fotosslideshow/refs/heads/main/dia-das-maes.jpg", "https://i.postimg.cc/9FvYYJw7/06.jpg"];

const TELAS = ["telaBoasVindas", "telaAgenda", "telaAniversario", "telaAvisos", "telaDicas", "telaPrevisao", "telaMidia", "telaNoticias", "telaCuriosidades"];

let telaAtual = 0, listaAgenda = [], agendaPagina = 0, listaDicas = [], dicaIdx = 0, listaAniv = [], slideIdx = 0, listaNoticias = [], noticiaPagina = 0;
let intervaloDicas, intervaloAgenda, intervaloSlides, intervaloNoticias, timeoutTroca;
let emPausaTotal = false;
let fonteNoticiaAtual = "NA"; 

const HORARIOS_PAUSA = [{h: 9, m: 30}, {h: 10, m: 0}, {h: 15, m: 15}, {h: 15, m: 30}, {h: 16, m: 00}, {h: 20, m: 00}];

// === SISTEMA DE RELÓGIO E REFRESH DE MEMÓRIA (SOLUÇÃO 3) ===
setInterval(() => {
  const agora = new Date();
  const h = agora.getHours(), m = agora.getMinutes(), s = agora.getSeconds();
  
  document.getElementById("hora").textContent = agora.toLocaleTimeString("pt-BR");
  const dataStr = agora.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  document.getElementById("data").textContent = dataStr.charAt(0).toUpperCase() + dataStr.slice(1);
  
  // LIMPEZA DE CICLO (Toda hora no minuto 00)
  // Em vez de recarregar a página, resetamos os contadores e forçamos nova busca de dados.
  if (m === 0 && s === 0) {
      console.log("Executando Limpeza Programada de Memória...");
      telaAtual = 0;
      listaAgenda = [];
      listaNoticias = [];
      carregarDados();
  }

  checarPausa();
}, 1000);

// === CONTROLE DE PAUSA (SIRENE) ===
function checarPausa() {
    const agora = new Date();
    const h = agora.getHours(), m = agora.getMinutes(), s = agora.getSeconds();
    document.getElementById("pausaRelogio").innerText = agora.toLocaleTimeString('pt-BR');
    const éHoraDePausa = HORARIOS_PAUSA.some(tempo => tempo.h === h && tempo.m === m);
    if(éHoraDePausa && s === 0 && !emPausaTotal) dispararPausa();
}

function dispararPausa() {
    emPausaTotal = true;
    clearTimeout(timeoutTroca);
    clearInterval(intervaloDicas); clearInterval(intervaloAgenda); clearInterval(intervaloSlides); clearInterval(intervaloNoticias);
    
    const telaP = document.getElementById("telaPausa");
    document.querySelectorAll(".tela").forEach(t => t.classList.remove("ativa"));
    telaP.classList.add("ativa", "pausa-ativa");
    
    document.getElementById("topBar").classList.remove("visivel");
    document.getElementById("climaBadge").classList.remove("visivel");
    
    const a1 = document.getElementById("audioInicio"), a2 = document.getElementById("audioFim");
    
    // Tenta tocar o áudio. Se o Android bloquear, o aviso na tela ajudará o usuário.
    a1.play().catch(e => { console.warn("Áudio bloqueado. Requer clique na tela."); }); 
    
    a1.onended = () => { a2.play().catch(e=>{}); };
    setTimeout(() => { a2.pause(); a2.currentTime = 0; a2.play().catch(e=>{}); }, 120000);
    setTimeout(() => { 
        emPausaTotal = false; 
        telaP.classList.remove("ativa", "pausa-ativa"); 
        telaAtual = 0; 
        trocarTela(); 
    }, 300000);
}

// === CARREGAMENTO DE DADOS COM RESILIÊNCIA (TRY/CATCH) ===
async function carregarDados() {
  try {
    // CLIMA
    const resC = await fetch(BASE_URL + "?tipo=clima").catch(() => null);
    if (resC) {
        const dC = await resC.json();
        document.getElementById("clima").textContent = `${Math.round(dC.temperatura)}°C`;
        document.getElementById("climaDesc").textContent = dC.descricao;
        document.getElementById("climaIcone").src = `https://openweathermap.org/img/wn/${dC.icone}@2x.png`;
    }
    
    // AGENDA
    const resA = await fetch(BASE_URL).catch(() => null); 
    if (resA) {
        const dA = await resA.json();
        listaAgenda = []; 
        const hojeStr = new Date().toLocaleDateString('pt-BR');
        for(let i=1; i<dA.length; i++) {
            let dataAg = new Date(dA[i][1]).toLocaleDateString('pt-BR');
            if(dataAg === hojeStr) listaAgenda.push(dA[i]);
        }
        if(listaAgenda.length > 0) renderizarAgenda();
    }
    
    // NOTICIAS
    let urlNoticia, nomeFonte;
    if (fonteNoticiaAtual === "NA") { urlNoticia = NA_RSS; nomeFonte = "NOTÍCIA NO ATO"; } 
    else if (fonteNoticiaAtual === "G1") { urlNoticia = G1_RSS; nomeFonte = "G1 SANTA CATARINA"; } 
    else { urlNoticia = ND_RSS; nomeFonte = "ND+ NOTÍCIAS"; }

    const resN = await fetch(urlNoticia).catch(() => null); 
    if (resN) {
        const dN = await resN.json();
        const itensFiltrados = (dN.items || []).filter(item => {
            const titulo = (item.title || "").toUpperCase();
            return !titulo.includes("AO VIVO") && !titulo.includes("ASSISTA");
        });

        listaNoticias = itensFiltrados.map(item => {
            let imgUrl = "https://via.placeholder.com/220x160?text=NOTICIAS+SC";
            const htmlBusca = item.content || item.description || "";
            const matchImg = htmlBusca.match(/src="([^">]+)"/);
            if (matchImg) imgUrl = matchImg[1];
            else if (item.enclosure && item.enclosure.link) imgUrl = item.enclosure.link;
            else if (item.thumbnail) imgUrl = item.thumbnail;
            return { title: item.title, description: (item.description || "").replace(/<[^>]*>?/gm, '').substring(0, 150) + "...", image: imgUrl, fonte: nomeFonte };
        });
        fonteNoticiaAtual = (fonteNoticiaAtual === "NA") ? "G1" : (fonteNoticiaAtual === "G1") ? "ND" : "NA";
        if(listaNoticias.length > 0) renderizarNoticias();
    }

    // AVISOS
    const resAv = await fetch(BASE_URL + "?tipo=avisos").catch(() => null); 
    if (resAv) {
        const dAv = await resAv.json();
        let hAv = ""; const hj = new Date().setHours(0,0,0,0);
        for(let i=1; i<dAv.length; i++) if(hj >= new Date(dAv[i][2]).setHours(0,0,0,0) && hj <= new Date(dAv[i][3]).setHours(0,0,0,0)) hAv += `<div class="aviso-card"><div class="aviso-icon">⚠️</div><div class="card-info"><h3>${dAv[i][0]}</h3><p>${dAv[i][1]}</p></div></div>`;
        document.getElementById("avisos").innerHTML = hAv || "<h3>Sem avisos para hoje.</h3>";
    }
    
    // PREVISÃO
    const resP = await fetch(BASE_URL + "?tipo=previsaoAmanha").catch(() => null); 
    if (resP) {
        const dP = await resP.json();
        let hHr = ""; if(dP.grafico) dP.grafico.forEach(p => { hHr += `<div class="hour-card"><span class="hour-time">${p.hora}h</span><img src="https://openweathermap.org/img/wn/${dP.icone}.png" width="50"><span class="hour-temp">${p.temp}°</span></div>`; });
        document.getElementById("previsaoBox").innerHTML = `<div class="clima-hero"><div style="text-align:center"><div class="temp-main">${dP.temperatura}°</div><div class="clima-desc-hero">${dP.descricao}</div></div><img src="https://openweathermap.org/img/wn/${dP.icone}@4x.png" style="width:200px; filter: drop-shadow(0 0 30px rgba(255,255,255,0.4));"><div class="clima-detalhes-grid"><div class="detalhe-item"><div class="detalhe-label">Máxima</div><div class="detalhe-valor" style="color:#ffb347">${dP.maxima}°</div></div><div class="detalhe-item"><div class="detalhe-label">Mínima</div><div class="detalhe-valor" style="color:#a2d2ff">${dP.minima}°</div></div><div class="detalhe-item"><div class="detalhe-label">Umidade</div><div class="detalhe-valor">${dP.umidade}%</div></div></div></div><div class="previsao-hourly">${hHr}</div>`;
    }
    
    // DICAS
    const resD = await fetch(BASE_URL + "?tipo=dicas").catch(() => null); 
    if (resD) {
        const dD = await resD.json();
        listaDicas = dD.slice(1); 
        document.getElementById("conteudoDicas").innerHTML = listaDicas.map((d, i) => `<div class="dica-item" id="dica_${i}" style="font-size: 4.5vh; display: none;"><strong>${d[0]}</strong><br>${d[1]}</div>`).join('');
    }
    
    // ANIVERSARIANTES
    const resAn = await fetch(BASE_URL + "?tipo=aniversariantes").catch(() => null); 
    if (resAn) {
        listaAniv = await resAn.json();
        document.getElementById("listaAniversariantes").innerHTML = listaAniv.map(p => `<div class="aniv-card"><div class="aniv-photo-wrapper"><img src="${p.foto}" class="aniv-photo"></div><div class="aniv-name">${p.nome}</div></div>`).join('');
    }
  } catch(e) { console.log("Ciclo de dados ignorado por erro de rede."); }
}

// === AUXILIARES DE TELA ===
async function exibirCuriosidade() {
    const textoEl = document.getElementById("textoCuriosidade");
    textoEl.style.opacity = 0;
    try {
        const res = await fetch("https://uselessfacts.jsph.pl/random.json?language=en");
        const data = await res.json();
        const resTrans = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=pt&dt=t&q=${encodeURIComponent(data.text)}`);
        const dataTrans = await resTrans.json();
        setTimeout(() => { textoEl.textContent = dataTrans[0][0][0]; textoEl.style.opacity = 1; }, 500);
    } catch (e) { textoEl.textContent = "Você sabia que o aprendizado constante mantém o cérebro jovem?"; textoEl.style.opacity = 1; }
}

function gerarConfetes() {
    const container = document.getElementById("confettiContainer");
    container.innerHTML = "";
    const cores = ["#FFD700", "#FFFFFF", "#FF69B4", "#00BFFF", "#ADFF2F", "#FF4500"];
    for(let i=0; i<60; i++) {
        const c = document.createElement("div");
        c.className = "confete";
        c.style.left = Math.random() * 100 + "vw";
        c.style.top = "-20px";
        const size = Math.random() * 10 + 6 + "px";
        c.style.width = size; c.style.height = size;
        c.style.backgroundColor = cores[Math.floor(Math.random()*cores.length)];
        c.style.animationDuration = (Math.random() * 3 + 3) + "s";
        c.style.animationDelay = (Math.random() * 5) + "s";
        container.appendChild(c);
    }
}

function renderizarAgenda() {
  const container = document.getElementById("containerScroll");
  if(!container) return;
  const itens = listaAgenda.slice(agendaPagina * 2, (agendaPagina + 1) * 2);
  container.innerHTML = itens.map(item => `<div class="event-card-bento"><div class="badge-hora">${new Date(item[1]).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div><h3>${item[0]}</h3><div class="local">📍 ${item[3]}</div></div>`).join('');
}

function renderizarNoticias() {
  const container = document.getElementById("containerNoticias");
  if(!container || listaNoticias.length === 0) return;
  const itens = listaNoticias.slice(noticiaPagina * 2, (noticiaPagina + 1) * 2);
  container.innerHTML = itens.map(item => `<div class="news-card-bento"><div class="badge-fonte">${item.fonte}</div><div class="news-content-wrapper"><img class="news-image" src="${item.image}"><div><h3>${item.title}</h3><div class="resumo">${item.description}</div></div></div></div>`).join('');
}

// === LÓGICA DE TRANSIÇÃO DE TELAS ===
function trocarTela() {
  if (emPausaTotal) return;
  
  const id = TELAS[telaAtual];
  
  // Pula telas sem conteúdo
  if(id === "telaAgenda" && listaAgenda.length === 0) { telaAtual = (telaAtual + 1) % TELAS.length; trocarTela(); return; }
  if(id === "telaAniversario" && listaAniv.length === 0) { telaAtual = (telaAtual + 1) % TELAS.length; trocarTela(); return; }
  if(id === "telaNoticias" && listaNoticias.length === 0) { telaAtual = (telaAtual + 1) % TELAS.length; trocarTela(); return; }

  document.querySelectorAll(".tela").forEach(t => t.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");
  
  const hide = ["telaBoasVindas", "telaMidia", "telaAniversario"].includes(id);
  document.getElementById("topBar").classList.toggle("visivel", !hide);
  document.getElementById("climaBadge").classList.toggle("visivel", !hide);
  
  clearInterval(intervaloDicas); clearInterval(intervaloAgenda); clearInterval(intervaloSlides); clearInterval(intervaloNoticias);
  let tempo = 12000;

  try {
    if(id === "telaBoasVindas") tempo = 6000;
    if(id === "telaAgenda") {
      agendaPagina = 0; renderizarAgenda();
      const paginasAgenda = Math.ceil(listaAgenda.length / 2);
      if(paginasAgenda > 1) {
        intervaloAgenda = setInterval(() => { agendaPagina++; if(agendaPagina < paginasAgenda) renderizarAgenda(); else clearInterval(intervaloAgenda); }, 8000);
        tempo = paginasAgenda * 8000;
      } else tempo = 10000;
    }
    if(id === "telaNoticias") {
      noticiaPagina = 0; renderizarNoticias();
      const totalNotPag = Math.min(3, Math.ceil(listaNoticias.length / 2));
      if(totalNotPag > 1) {
          intervaloNoticias = setInterval(() => { noticiaPagina++; if(noticiaPagina < totalNotPag) renderizarNoticias(); else clearInterval(intervaloNoticias); }, 11500);
          tempo = totalNotPag * 11500; 
      } else tempo = 12000;
    }
    if(id === "telaDicas" && listaDicas.length > 0) {
        dicaIdx = 0;
        const dF = () => { 
            document.querySelectorAll('.dica-item').forEach(el=>el.style.display='none'); 
            if(document.getElementById(`dica_${dicaIdx}`)) document.getElementById(`dica_${dicaIdx}`).style.display='block'; 
            dicaIdx++; if(dicaIdx >= Math.min(listaDicas.length, 3)) clearInterval(intervaloDicas);
        };
        dF(); intervaloDicas = setInterval(dF, 8000); tempo = Math.min(listaDicas.length, 3) * 8000;
    }
    if(id === "telaMidia") {
        slideIdx = 0;
        const sF = () => { document.getElementById("slideshow").style.backgroundImage = `url('${SLIDES[slideIdx]}')`; slideIdx++; if(slideIdx >= SLIDES.length) clearInterval(intervaloSlides); };
        sF(); intervaloSlides = setInterval(sF, 6800); tempo = SLIDES.length * 7000;
    }
    if(id === "telaAniversario") { gerarConfetes(); tempo = 15000; }
    if(id === "telaCuriosidades") { exibirCuriosidade(); tempo = 18000; }
  } catch(e) { tempo = 5000; }
  
  telaAtual = (telaAtual + 1) % TELAS.length;
  if(telaAtual === 0) carregarDados(); 
  timeoutTroca = setTimeout(trocarTela, tempo);
}

// === GESTÃO DE ÁUDIO (PARA ANDROID TV) ===
function inicializarAudio() {
    const a1 = document.getElementById("audioInicio");
    // Tenta liberar o áudio com um toque mudo
    a1.play().then(() => {
        a1.pause(); a1.currentTime = 0;
    }).catch(() => {
        // Se falhar, mostra aviso visual para o usuário clicar
        const aviso = document.createElement("div");
        aviso.id = "avisoAudioManual";
        aviso.innerHTML = "🔊 CLIQUE NA TELA PARA ATIVAR O SOM DA SIRENE";
        aviso.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(255,179,71,0.9); color:black; padding:15px 30px; border-radius:50px; font-weight:900; z-index:99999; cursor:pointer; box-shadow:0 10px 30px rgba(0,0,0,0.5);";
        aviso.onclick = () => { 
            a1.play().then(() => { a1.pause(); a1.currentTime = 0; aviso.remove(); }); 
        };
        document.body.appendChild(aviso);
    });
}

// INICIALIZAÇÃO
carregarDados().finally(() => {
    inicializarAudio();
    setTimeout(trocarTela, 3000);
});
</script>
